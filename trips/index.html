<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All trips &mdash; Decandia</title>
<meta name="description" content="All travel stories, grouped by area and country.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand">decandia<span>.</span></a>
  <div class="nav-links">
    <a href="/#areas">Areas</a>
    <a href="/trips/">All trips</a>
    <a href="/#about">About</a>
    <button id="search-trigger" class="nav-search" aria-label="Search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <span>Search</span>
      <kbd>&#8984;K</kbd>
    </button>
  </div>
</nav>

<section class="section" style="padding-top: 9rem;">
  <span class="section-eyebrow">The journals</span>
  <h2>All trips</h2>
  <p class="lead">Every story I have written, grouped by area.</p>

  <div id="trips-by-region"></div>
</section>

<footer class="footer">
  <p>&copy; decandia.eu &mdash; A personal travel journal</p>
</footer>

<!-- SEARCH OVERLAY -->
<div id="search-overlay" class="search-overlay">
  <div class="search-modal">
    <div class="search-input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="search-input" placeholder="Search by country, region or keyword&hellip;" autocomplete="off">
      <button id="search-close" class="search-close">ESC</button>
    </div>
    <div id="search-results">
      <p class="search-hint">Start typing to search by country, region or keyword&hellip;</p>
    </div>
  </div>
</div>

<script src="/assets/js/search.js"></script>
<script>
function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }

fetch('/trips.json').then(r => r.json()).then(trips => {
  const groups = new Map();
  trips.forEach(t => {
    const key = t.continent + '||' + t.region;
    if (!groups.has(key)) groups.set(key, { continent: t.continent, region: t.region, trips: [] });
    groups.get(key).trips.push(t);
  });

  const sorted = Array.from(groups.values()).sort((a, b) => a.region.localeCompare(b.region));

  document.getElementById('trips-by-region').innerHTML = sorted.map(g => `
    <div class="region-block" id="${slugify(g.continent + '-' + g.region)}">
      <div class="region-header">
        <h3>${g.region}</h3>
        <span class="country-tag">${g.continent}</span>
        <span class="country-count">${g.trips.length} ${g.trips.length === 1 ? 'story' : 'stories'}</span>
      </div>
      <div class="trips-grid">
        ${g.trips.map(t => `
          <a href="${t.url}" class="trip-card">
            <div class="trip-card-img" style="background-image: url('${t.image}');"></div>
            <div class="trip-card-body">
              <span class="trip-card-region">${t.country}</span>
              <h3 class="trip-card-title">${t.title}</h3>
              <p class="trip-card-tag">${t.tagline}</p>
            </div>
          </a>
        `).join('')}
      </div>
    </div>
  `).join('');

  // Smooth scroll if hash present after content rendered
  if (location.hash) {
    const el = document.getElementById(location.hash.slice(1));
    if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }
});
</script>

</body>
</html>
