mainSections   = ["post"]
rssFullContent = false
favicon        = ""

[footer]
    since      = 2026
    customText = ""

[dateFormat]
    published   = ""
    lastUpdated = ""

[sidebar]
    emoji    = "🌍"
    subtitle = "A personal travel journal — stories, places and routes from years on the road."
    avatar   = "https://images.unsplash.com/photo-1502920917128-1aa500764cbd?w=400&q=80"

[article]
    math        = false
    toc         = true
    readingTime = true
    [article.license]
        enabled = false

[comments]
    enabled = false

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [
        { type = "toc" },
    ]

[opengraph]
    [opengraph.twitter]
        site = ""
        card = "summary_large_image"

[defaultImage]
    [defaultImage.opengraph]
        enabled = false

[colorScheme]
    toggle  = true
    default = "auto"

[imageProcessing]
    [imageProcessing.cover]
        enabled = true
    [imageProcessing.content]
        enabled = true
